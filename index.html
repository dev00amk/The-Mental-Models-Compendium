<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental Models Compendium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   ART DIRECTION: Reference atlas / intellectual cabinet
   Palette: Deep charcoal surfaces, gold accent — feels like
            a leather-bound compendium, premium & scholarly.
   Typography: Instrument Serif (display) + DM Sans (body)
   Density: Balanced — generous hero, tight index cards
   ============================================================ */

:root, [data-theme="light"] {
  --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
  --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
  --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
  --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
  --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
  --text-2xl:  clamp(2rem,     1.2rem  + 2.5vw,  3.5rem);
  --text-3xl:  clamp(2.5rem,   1rem    + 4vw,    5rem);

  --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
  --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
  --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
  --space-16: 4rem;   --space-20: 5rem;   --space-24: 6rem;

  --color-bg:             #f7f5f0;
  --color-surface:        #f9f8f4;
  --color-surface-2:      #fbfbf8;
  --color-surface-offset: #f0ede6;
  --color-divider:        #dcd8d0;
  --color-border:         #d0ccc3;
  --color-text:           #22201a;
  --color-text-muted:     #6b6860;
  --color-text-faint:     #b0ada6;
  --color-text-inverse:   #f7f5f0;

  --color-primary:        #b07a00;
  --color-primary-hover:  #8a5c00;
  --color-primary-active: #5c3b00;
  --color-primary-highlight: #f0e6c8;

  --color-accent-teal:    #016b6e;
  --color-accent-rust:    #a0391a;
  --color-accent-violet:  #6a3aaa;
  --color-accent-green:   #3a7a22;
  --color-accent-blue:    #1a5090;
  --color-accent-rose:    #a02860;
  --color-accent-orange:  #c05000;
  --color-accent-slate:   #3a5a7a;
  --color-accent-olive:   #5a6a1a;

  --radius-sm: 0.375rem; --radius-md: 0.5rem;
  --radius-lg: 0.75rem;  --radius-xl: 1rem; --radius-full: 9999px;
  --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
  --shadow-sm: 0 1px 3px oklch(0.2 0.02 80 / 0.07);
  --shadow-md: 0 4px 14px oklch(0.2 0.02 80 / 0.09);
  --shadow-lg: 0 12px 36px oklch(0.2 0.02 80 / 0.13);

  --font-display: 'Instrument Serif', Georgia, serif;
  --font-body: 'DM Sans', 'Helvetica Neue', sans-serif;
  --content-narrow: 640px; --content-default: 960px; --content-wide: 1280px;
}

[data-theme="dark"] {
  --color-bg:             #13120f;
  --color-surface:        #1a1916;
  --color-surface-2:      #201f1c;
  --color-surface-offset: #161510;
  --color-divider:        #2a2924;
  --color-border:         #353430;
  --color-text:           #d8d5ce;
  --color-text-muted:     #8a8880;
  --color-text-faint:     #504e48;
  --color-text-inverse:   #13120f;
  --color-primary:        #d4a030;
  --color-primary-hover:  #e8b848;
  --color-primary-active: #f0ca60;
  --color-primary-highlight: #2e2510;
  --color-accent-teal:    #4ab8bc;
  --color-accent-rust:    #e06840;
  --color-accent-violet:  #a878e0;
  --color-accent-green:   #70c048;
  --color-accent-blue:    #5898e0;
  --color-accent-rose:    #e060a8;
  --color-accent-orange:  #f09030;
  --color-accent-slate:   #78a8d8;
  --color-accent-olive:   #a8c840;
  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.25);
  --shadow-md: 0 4px 14px oklch(0 0 0 / 0.35);
  --shadow-lg: 0 12px 36px oklch(0 0 0 / 0.45);
}

@media (prefers-color-scheme: light) {
  :root:not([data-theme]) {
    --color-bg: #f7f5f0; --color-surface: #f9f8f4;
    --color-surface-2: #fbfbf8; --color-surface-offset: #f0ede6;
    --color-divider: #dcd8d0; --color-border: #d0ccc3;
    --color-text: #22201a; --color-text-muted: #6b6860;
    --color-text-faint: #b0ada6; --color-text-inverse: #f7f5f0;
    --color-primary: #b07a00; --color-primary-hover: #8a5c00;
    --color-primary-highlight: #f0e6c8;
    --color-accent-teal: #016b6e; --color-accent-rust: #a0391a;
    --color-accent-violet: #6a3aaa; --color-accent-green: #3a7a22;
    --color-accent-blue: #1a5090; --color-accent-rose: #a02860;
    --color-accent-orange: #c05000; --color-accent-slate: #3a5a7a;
    --color-accent-olive: #5a6a1a;
    --shadow-sm: 0 1px 3px oklch(0.2 0.02 80 / 0.07);
    --shadow-md: 0 4px 14px oklch(0.2 0.02 80 / 0.09);
    --shadow-lg: 0 12px 36px oklch(0.2 0.02 80 / 0.13);
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  scroll-behavior: smooth;
  scroll-padding-top: 5rem;
}

body {
  min-height: 100dvh;
  font-family: var(--font-body);
  font-size: var(--text-base);
  color: var(--color-text);
  background-color: var(--color-bg);
  line-height: 1.6;
  transition: background-color 0.3s ease, color 0.3s ease;
}

img { display: block; max-width: 100%; height: auto; }
input, button, select { font: inherit; color: inherit; }
h1, h2, h3, h4 { text-wrap: balance; line-height: 1.2; font-family: var(--font-display); }
p, li { text-wrap: pretty; }
button { cursor: pointer; background: none; border: none; }

::selection { background: oklch(from var(--color-primary) l c h / 0.25); }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }
a, button, [role="button"] { transition: color var(--transition-interactive), background var(--transition-interactive), box-shadow var(--transition-interactive); }

/* ── LAYOUT ── */
.container { max-width: var(--content-wide); margin-inline: auto; padding-inline: var(--space-6); }
.container--narrow { max-width: var(--content-narrow); margin-inline: auto; padding-inline: var(--space-6); }

/* ── HEADER ── */
.site-header {
  position: sticky; top: 0; z-index: 100;
  background: color-mix(in oklch, var(--color-bg) 85%, transparent);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--color-divider);
  padding: var(--space-3) 0;
  transition: background 0.3s ease;
}

.header-inner {
  display: flex; align-items: center; gap: var(--space-4);
  max-width: var(--content-wide); margin-inline: auto; padding-inline: var(--space-6);
}

.site-logo {
  display: flex; align-items: center; gap: var(--space-2);
  text-decoration: none; color: var(--color-text); flex-shrink: 0;
}
.site-logo svg { color: var(--color-primary); }
.site-logo-text {
  font-family: var(--font-display); font-size: var(--text-sm);
  font-weight: 400; letter-spacing: 0.02em; color: var(--color-text);
  line-height: 1.2;
}
.site-logo-text span { display: block; font-size: var(--text-xs); color: var(--color-text-muted); font-family: var(--font-body); font-weight: 400; }

.header-search {
  flex: 1; position: relative;
}
.header-search input {
  width: 100%; background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  padding: var(--space-2) var(--space-4) var(--space-2) var(--space-10);
  font-size: var(--text-sm); color: var(--color-text);
  transition: border-color var(--transition-interactive), box-shadow var(--transition-interactive);
}
.header-search input:focus {
  outline: none; border-color: var(--color-primary);
  box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15);
}
.header-search input::placeholder { color: var(--color-text-faint); }
.search-icon {
  position: absolute; left: var(--space-3); top: 50%; transform: translateY(-50%);
  color: var(--color-text-faint); pointer-events: none;
}

.header-controls { display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; }

.count-badge {
  font-size: var(--text-xs); color: var(--color-text-muted);
  background: var(--color-surface-offset);
  padding: var(--space-1) var(--space-3); border-radius: var(--radius-full);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

.icon-btn {
  display: flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: var(--radius-md);
  color: var(--color-text-muted); background: transparent;
  transition: color var(--transition-interactive), background var(--transition-interactive);
}
.icon-btn:hover { color: var(--color-text); background: var(--color-surface-offset); }
.icon-btn:active { transform: scale(0.95); }

/* ── HERO ── */
.hero {
  padding: var(--space-20) 0 var(--space-10);
  border-bottom: 1px solid var(--color-divider);
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 60% 0%, oklch(from var(--color-primary) l c h / 0.07), transparent 70%);
  pointer-events: none;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-xs); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--color-primary); margin-bottom: var(--space-4);
}
.hero-eyebrow::before { content: ''; display: block; width: 24px; height: 1px; background: var(--color-primary); }
.hero h1 {
  font-size: var(--text-3xl); font-weight: 400; line-height: 1.1;
  color: var(--color-text); margin-bottom: var(--space-4); max-width: 18ch;
}
.hero h1 em { font-style: italic; color: var(--color-primary); }
.hero p {
  font-size: var(--text-base); color: var(--color-text-muted);
  max-width: 54ch; line-height: 1.7; margin-bottom: var(--space-8);
}

/* ── CATEGORY FILTERS ── */
.filter-bar {
  display: flex; gap: var(--space-2); flex-wrap: wrap;
  padding: var(--space-6) 0;
  border-bottom: 1px solid var(--color-divider);
  position: sticky; top: 57px; z-index: 90;
  background: color-mix(in oklch, var(--color-bg) 92%, transparent);
  backdrop-filter: blur(8px);
}

.filter-pill {
  display: inline-flex; align-items: center; gap: var(--space-2);
  padding: var(--space-1) var(--space-3); border-radius: var(--radius-full);
  font-size: var(--text-xs); font-weight: 500; cursor: pointer;
  border: 1px solid var(--color-border); background: var(--color-surface);
  color: var(--color-text-muted); white-space: nowrap;
  transition: all var(--transition-interactive);
}
.filter-pill:hover { border-color: var(--color-primary); color: var(--color-primary); }
.filter-pill.active {
  background: var(--color-primary); border-color: var(--color-primary);
  color: var(--color-text-inverse);
}
.filter-pill .pill-count {
  background: oklch(from currentColor l c h / 0.2);
  padding: 0 var(--space-1); border-radius: var(--radius-full);
  min-width: 18px; text-align: center;
}

/* ── MAIN GRID ── */
.main-layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 0;
  min-height: calc(100vh - 200px);
}

/* ── SIDEBAR ── */
.sidebar {
  position: sticky; top: 120px;
  height: calc(100vh - 120px);
  overflow-y: auto; overflow-x: hidden;
  padding: var(--space-6) 0;
  border-right: 1px solid var(--color-divider);
  scrollbar-width: thin;
  scrollbar-color: var(--color-border) transparent;
}

.sidebar-section { margin-bottom: var(--space-6); }
.sidebar-label {
  font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--color-text-faint); padding: 0 var(--space-4) var(--space-2);
}
.sidebar-link {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  font-size: var(--text-sm); color: var(--color-text-muted);
  text-decoration: none; border-radius: 0;
  transition: color var(--transition-interactive), background var(--transition-interactive);
  cursor: pointer; width: 100%; text-align: left;
}
.sidebar-link:hover { color: var(--color-text); background: var(--color-surface-offset); }
.sidebar-link.active { color: var(--color-primary); background: var(--color-primary-highlight); font-weight: 500; }
.sidebar-link .cat-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: currentColor; opacity: 0.5;
}
.sidebar-link.active .cat-dot { opacity: 1; }

/* ── CONTENT AREA ── */
.content-area { padding: var(--space-6) var(--space-8); }

/* ── CATEGORY SECTION ── */
.category-section { margin-bottom: var(--space-16); scroll-margin-top: 120px; }

.category-header {
  display: flex; align-items: baseline; gap: var(--space-4);
  margin-bottom: var(--space-6); padding-bottom: var(--space-4);
  border-bottom: 1px solid var(--color-divider);
}
.category-numeral {
  font-family: var(--font-display); font-size: var(--text-xl);
  color: var(--color-text-faint); font-weight: 400;
  font-style: italic; line-height: 1; flex-shrink: 0;
}
.category-title-wrap { flex: 1; }
.category-title {
  font-family: var(--font-display); font-size: var(--text-xl);
  color: var(--color-text); font-weight: 400; line-height: 1.1;
}
.category-subtitle { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1); }
.category-count {
  font-size: var(--text-xs); color: var(--color-text-faint);
  font-variant-numeric: tabular-nums; flex-shrink: 0;
}

/* ── MODELS GRID ── */
.models-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
  gap: var(--space-4);
}

/* ── MODEL CARD ── */
.model-card {
  background: var(--color-surface);
  border: 1px solid oklch(from var(--color-text) l c h / 0.1);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  cursor: pointer;
  transition: box-shadow var(--transition-interactive), transform var(--transition-interactive), border-color var(--transition-interactive);
  position: relative;
  overflow: hidden;
}
.model-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--cat-color, var(--color-primary));
  opacity: 0;
  transition: opacity var(--transition-interactive);
}
.model-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
  border-color: oklch(from var(--color-text) l c h / 0.18);
}
.model-card:hover::before { opacity: 1; }
.model-card:active { transform: translateY(0); box-shadow: var(--shadow-sm); }

.model-card-header { display: flex; align-items: flex-start; gap: var(--space-3); margin-bottom: var(--space-3); }
.model-index {
  font-size: var(--text-xs); color: var(--color-text-faint);
  font-variant-numeric: tabular-nums; padding-top: 2px; flex-shrink: 0; min-width: 22px;
}
.model-name {
  font-family: var(--font-display); font-size: var(--text-base);
  font-weight: 400; color: var(--color-text); line-height: 1.3; flex: 1;
}
.model-name em { font-style: italic; }

.model-what {
  font-size: var(--text-sm); color: var(--color-text-muted);
  line-height: 1.6; margin-bottom: var(--space-3);
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}

.model-when {
  display: flex; align-items: flex-start; gap: var(--space-2);
  font-size: var(--text-xs); color: var(--color-text-faint); line-height: 1.4;
}
.model-when-label {
  flex-shrink: 0; font-weight: 600; letter-spacing: 0.05em;
  color: var(--cat-color, var(--color-primary)); font-size: 10px; text-transform: uppercase;
  padding-top: 2px;
}

/* ── MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 200;
  background: oklch(0.1 0.01 80 / 0.7);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: var(--space-4);
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  width: 100%; max-width: 580px; max-height: 85dvh;
  overflow-y: auto; padding: var(--space-8);
  transform: scale(0.96) translateY(8px);
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  scrollbar-width: thin;
}
.modal-backdrop.open .modal { transform: scale(1) translateY(0); }

.modal-close {
  position: absolute; top: var(--space-4); right: var(--space-4);
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: var(--radius-full);
  color: var(--color-text-muted); background: var(--color-surface-offset);
  transition: color var(--transition-interactive), background var(--transition-interactive);
}
.modal-close:hover { color: var(--color-text); background: var(--color-border); }

.modal-category-badge {
  display: inline-flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-xs); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  padding: var(--space-1) var(--space-3); border-radius: var(--radius-full);
  margin-bottom: var(--space-4);
  border: 1px solid oklch(from var(--cat-color, var(--color-primary)) l c h / 0.3);
  background: oklch(from var(--cat-color, var(--color-primary)) l c h / 0.1);
  color: var(--cat-color, var(--color-primary));
}

.modal-title {
  font-family: var(--font-display); font-size: var(--text-2xl);
  font-weight: 400; color: var(--color-text); margin-bottom: var(--space-6);
  line-height: 1.1;
}
.modal-title em { font-style: italic; }

.modal-section { margin-bottom: var(--space-5); }
.modal-section-label {
  font-size: var(--text-xs); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--color-text-faint); margin-bottom: var(--space-2);
}
.modal-section-body {
  font-size: var(--text-base); color: var(--color-text-muted); line-height: 1.75;
}

.modal-when-box {
  background: var(--color-surface-offset);
  border-left: 3px solid var(--cat-color, var(--color-primary));
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  padding: var(--space-4) var(--space-5);
  margin-bottom: var(--space-5);
}
.modal-when-box .modal-section-label { margin-bottom: var(--space-2); color: var(--cat-color, var(--color-primary)); }
.modal-when-body { font-size: var(--text-sm); color: var(--color-text-muted); line-height: 1.65; font-style: italic; }

.modal-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: var(--space-5); border-top: 1px solid var(--color-divider);
  margin-top: var(--space-6);
}
.modal-nav-btn {
  display: flex; align-items: center; gap: var(--space-2);
  font-size: var(--text-sm); color: var(--color-text-muted);
  padding: var(--space-2) var(--space-3); border-radius: var(--radius-md);
  border: 1px solid var(--color-border); background: var(--color-surface);
  transition: all var(--transition-interactive);
}
.modal-nav-btn:hover { color: var(--color-text); border-color: var(--color-primary); }
.modal-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; padding: var(--space-24) var(--space-8);
  color: var(--color-text-muted);
}
.empty-state svg { color: var(--color-text-faint); margin-bottom: var(--space-4); }
.empty-state h3 { font-family: var(--font-display); color: var(--color-text); margin-bottom: var(--space-2); }
.empty-state p { max-width: 36ch; font-size: var(--text-sm); }

/* ── STATS BAR ── */
.stats-bar {
  display: flex; gap: var(--space-8); padding: var(--space-6) 0;
  border-bottom: 1px solid var(--color-divider); flex-wrap: wrap;
}
.stat-item {}
.stat-value {
  font-family: var(--font-display); font-size: var(--text-xl);
  color: var(--color-text); font-weight: 400; font-style: italic;
  display: block; line-height: 1;
}
.stat-label { font-size: var(--text-xs); color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.08em; }

// Build global index
let globalIndex = 0;
const allModels = [];
CATEGORIES.forEach((cat, ci) => {
  cat.models.forEach((m, mi) => {
    globalIndex++;
    allModels.push({ ...m, catIndex: ci, modelIndex: mi, globalNum: globalIndex, catSlug: cat.slug, catTitle: cat.title, catNum: cat.num, catColor: cat.color });
  });
});

// ── STATE ──
let currentFilter = 'all';
let currentSearch = '';
let openModelIndex = null; // index into filtered list

// ── RENDER ──
function getCatColorVarName(color) { return color; }

function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  let html = `<div class="sidebar-section"><div class="sidebar-label">Domains</div>`;
  html += `<button class="sidebar-link ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')"><span class="cat-dot" style="background:var(--color-text-muted)"></span>All Models</button>`;
  CATEGORIES.forEach(cat => {
    html += `<button class="sidebar-link ${currentFilter === cat.slug ? 'active' : ''}" onclick="setFilter('${cat.slug}'); scrollToCategory('${cat.slug}')" style="--cat-color:${cat.color}">
      <span class="cat-dot"></span>${cat.num}. ${cat.title}
    </button>`;
  });
  html += `</div>`;
  sidebar.innerHTML = html;
}

function buildFilterBar() {
  const bar = document.getElementById('filterBar');
  let html = `<button class="filter-pill ${currentFilter === 'all' ? 'active' : ''}" onclick="setFilter('all')">All <span class="pill-count">${allModels.length}</span></button>`;
  CATEGORIES.forEach(cat => {
    html += `<button class="filter-pill ${currentFilter === cat.slug ? 'active' : ''}" onclick="setFilter('${cat.slug}')" style="${currentFilter === cat.slug ? `--pill-accent:${cat.color}` : ''}">
      ${cat.num}. ${cat.title} <span class="pill-count">${cat.models.length}</span>
    </button>`;
  });
  bar.innerHTML = html;
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function buildContent() {
  const content = document.getElementById('contentArea');
  const search = currentSearch.toLowerCase().trim();
  let totalVisible = 0;

  let html = '';

  const filtered = currentFilter === 'all'
    ? CATEGORIES
    : CATEGORIES.filter(c => c.slug === currentFilter);

  filtered.forEach((cat, ci) => {
    const visibleModels = cat.models.filter((m, mi) => {
      if (!search) return true;
      const globalM = allModels.find(gm => gm.catSlug === cat.slug && gm.modelIndex === mi);
      return m.name.toLowerCase().includes(search) ||
             m.what.toLowerCase().includes(search) ||
             m.when.toLowerCase().includes(search);
    }).map((m, filteredMi) => {
      const globalM = allModels.find(gm => gm.catSlug === cat.slug && gm.name === m.name);
      return { ...m, globalNum: globalM ? globalM.globalNum : 0, modelIndex: cat.models.indexOf(m) };
    });

    if (visibleModels.length === 0) return;
    totalVisible += visibleModels.length;

    html += `<section class="category-section fade-in" id="cat-${cat.slug}" data-cat="${cat.slug}">
      <div class="category-header">
        <div class="category-numeral">${cat.num}</div>
        <div class="category-title-wrap">
          <div class="category-title" style="color:${cat.color}">${cat.title}</div>
          <div class="category-subtitle">${cat.desc}</div>
        </div>
        <div class="category-count">${visibleModels.length} model${visibleModels.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="models-grid">`;

    visibleModels.forEach((m) => {
      const globalM = allModels.find(gm => gm.catSlug === cat.slug && gm.name === m.name);
      const gIdx = globalM ? allModels.indexOf(globalM) : 0;
      html += `<article class="model-card" style="--cat-color:${cat.color}" onclick="openModal(${gIdx})" tabindex="0" role="button" aria-label="${m.name}">
        <div class="model-card-header">
          <span class="model-index">${String(m.globalNum).padStart(2,'0')}</span>
          <h3 class="model-name">${highlight(m.name, currentSearch)}</h3>
        </div>
        <p class="model-what">${highlight(m.what, currentSearch)}</p>
        <div class="model-when">
          <span class="model-when-label">When</span>
          <span>${highlight(m.when, currentSearch)}</span>
        </div>
      </article>`;
    });

    html += `</div></section>`;
  });

  if (totalVisible === 0) {
    html = `<div class="empty-state no-results visible">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6M11 8v6" opacity="0.5"/></svg>
      <h3>No models found</h3>
      <p>Try a different search term or browse by category.</p>
    </div>`;
  }

  content.innerHTML = html;
  document.getElementById('visibleCount').textContent = `${totalVisible} model${totalVisible !== 1 ? 's' : ''}`;

  // Keyboard for cards
  content.querySelectorAll('.model-card').forEach(card => {
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); card.click(); }
    });
  });
}

function setFilter(slug) {
  currentFilter = slug;
  buildSidebar();
  buildFilterBar();
  buildContent();
}

function scrollToCategory(slug) {
  const el = document.getElementById(`cat-${slug}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── MODAL ──
function openModal(globalIdx) {
  const m = allModels[globalIdx];
  if (!m) return;
  openModelIndex = globalIdx;
  const backdrop = document.getElementById('modalBackdrop');
  const content = document.getElementById('modalContent');

  const prevDisabled = globalIdx === 0 ? 'disabled' : '';
  const nextDisabled = globalIdx === allModels.length - 1 ? 'disabled' : '';
  const prevLabel = globalIdx > 0 ? allModels[globalIdx-1].name : '';
  const nextLabel = globalIdx < allModels.length - 1 ? allModels[globalIdx+1].name : '';

  content.innerHTML = `
    <button class="modal-close" id="modalClose" aria-label="Close modal">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="modal-category-badge" style="--cat-color:${m.catColor}">${m.catNum}. ${m.catTitle}</div>
    <h2 class="modal-title" id="modalTitle">${m.name}</h2>
    <div class="modal-section">
      <div class="modal-section-label">What it says</div>
      <div class="modal-section-body">${m.what}</div>
    </div>
    <div class="modal-when-box" style="--cat-color:${m.catColor}">
      <div class="modal-section-label">Reach for it when</div>
      <div class="modal-when-body">${m.when}</div>
    </div>
    <div class="modal-nav">
      <button class="modal-nav-btn" onclick="navigateModal(-1)" ${prevDisabled} aria-label="Previous model">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        <span>${prevLabel ? prevLabel.substring(0,24)+(prevLabel.length>24?'…':'') : 'Previous'}</span>
      </button>
      <span style="font-size:var(--text-xs);color:var(--color-text-faint);font-variant-numeric:tabular-nums">${globalIdx+1} / ${allModels.length}</span>
      <button class="modal-nav-btn" onclick="navigateModal(1)" ${nextDisabled} aria-label="Next model">
        <span>${nextLabel ? nextLabel.substring(0,24)+(nextLabel.length>24?'…':'') : 'Next'}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>`;

  backdrop.classList.add('open');
  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  document.body.style.overflow = '';
  openModelIndex = null;
}

function navigateModal(dir) {
  if (openModelIndex === null) return;
  const next = openModelIndex + dir;
  if (next >= 0 && next < allModels.length) openModal(next);
}

// ── SEARCH ──
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  if (currentSearch.trim()) currentFilter = 'all';
  buildSidebar();
  buildFilterBar();
  buildContent();
});

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== document.getElementById('searchInput')) {
    e.preventDefault();
    document.getElementById('searchInput').focus();
    document.getElementById('searchInput').select();
  }
  if (e.key === 'Escape') {
    if (document.getElementById('modalBackdrop').classList.contains('open')) {
      closeModal();
    } else {
      const inp = document.getElementById('searchInput');
      if (inp.value) { inp.value = ''; currentSearch = ''; buildSidebar(); buildFilterBar(); buildContent(); }
      inp.blur();
    }
  }
  if (document.getElementById('modalBackdrop').classList.contains('open')) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigateModal(1); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); navigateModal(-1); }
  }
});

// ── MODAL BACKDROP CLICK ──
document.getElementById('modalBackdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
});

// ── READING PROGRESS ──
window.addEventListener('scroll', () => {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  document.getElementById('readingProgress').style.width = pct + '%';
});

// ── THEME TOGGLE ──
(function() {
  const html = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  let dark = true;

  function setTheme(isDark) {
    dark = isDark;
    html.setAttribute('data-theme', dark ? 'dark' : 'light');
    toggle.innerHTML = dark
      ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    toggle.setAttribute('aria-label', `Switch to ${dark ? 'light' : 'dark'} mode`);
  }

  toggle.addEventListener('click', () => setTheme(!dark));
  setTheme(true);
})();

// ── ACTIVE SIDEBAR ON SCROLL ──
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const slug = entry.target.dataset.cat;
      document.querySelectorAll('.sidebar-link').forEach(l => {
        l.classList.toggle('active', l.getAttribute('onclick') && l.getAttribute('onclick').includes(slug));
      });
    }
  });
}, { rootMargin: '-20% 0px -70% 0px' });

// ── INIT ──
buildSidebar();
buildFilterBar();
buildContent();

// Observe sections after build
setTimeout(() => {
  document.querySelectorAll('.category-section').forEach(s => observer.observe(s));
}, 100);
</script>
</body>
</html>
